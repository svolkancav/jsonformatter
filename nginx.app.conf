# nginx config for the jsonformatter_app container (serves the built SPA +
# prerendered per-route pages). Copied to /etc/nginx/conf.d/default.conf by the
# Dockerfile, replacing the stock nginx default.
#
# Goal: a request like /json-to-toon must serve the prerendered
# /json-to-toon/index.html directly (HTTP 200, no redirect) so Google sees the
# unique per-route <title>/meta. Unknown routes fall back to the SPA shell.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Root -> homepage shell.
    location = / {
        try_files /index.html =404;
    }

    # /json-to-toon -> /json-to-toon/index.html (200, no redirect).
    # Anything unresolved -> /index.html so the client router can handle it.
    location / {
        try_files $uri $uri/index.html /index.html;
    }

    # Hashed build assets are immutable; cache them hard.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
